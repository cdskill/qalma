<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="utf-8" />
    <title>Qalma — Headless rich text editing for Angular</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Qalma is a headless, plugin-based rich text editor for Angular, built on ProseMirror. Composable primitives, Tailwind-first styling, your art direction."
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Imperial+Script&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="/src/styles.css" />
    <script>
      // Apply the persisted (or system) theme before hydration to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem('qalma-theme');
          var prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
