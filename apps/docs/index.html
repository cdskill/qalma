<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="utf-8" />
    <title>Qalma — Headless rich text editor for Angular</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Qalma is a headless, plugin-based rich text editor for Angular, built on ProseMirror. Composable primitives, Tailwind-first styling, your art direction."
    />

    <!-- Canonical + social. Per-page og:url/og:title/og:description and the
         canonical href are overridden at (pre)render time by SeoTitleStrategy. -->
    <link rel="canonical" href="https://qalma.dev/" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a0a0a"
      media="(prefers-color-scheme: dark)"
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Qalma" />
    <meta property="og:url" content="https://qalma.dev/" />
    <meta
      property="og:title"
      content="Qalma — Headless rich text editor for Angular"
    />
    <meta
      property="og:description"
      content="A headless, plugin-based rich text editor for Angular, built on ProseMirror. Composable primitives, Tailwind-first styling, your art direction."
    />
    <meta property="og:image" content="https://qalma.dev/og-image.png" />
    <meta
      property="og:image:secure_url"
      content="https://qalma.dev/og-image.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Qalma — Headless rich text editor for Angular"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Qalma — Headless rich text editor for Angular"
    />
    <meta
      name="twitter:description"
      content="A headless, plugin-based rich text editor for Angular, built on ProseMirror."
    />
    <meta name="twitter:image" content="https://qalma.dev/og-image.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Qalma",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "description": "A headless, plugin-based rich text editor for Angular, built on ProseMirror.",
        "url": "https://qalma.dev/",
        "softwareRequirements": "Angular",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <link
      rel="icon"
      type="image/svg+xml"
      href="/qalma-mark-light.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/qalma-mark-dark.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="icon" type="image/svg+xml" href="/qalma-mark-light.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load the font stylesheet without blocking render: fetch it as a
         non-applicable "print" sheet, then swap to "all" once loaded. With
         display=swap the fallback text shows immediately and swaps in place. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Imperial+Script&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Imperial+Script&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="/src/styles.css" />
    <script>
      // Apply the persisted (or system) theme before hydration to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem('qalma-theme');
          var prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
