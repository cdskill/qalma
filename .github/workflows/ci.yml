name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protected-test-changes:
    name: Guard protected test changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: pull-request

      - name: Checkout trusted guard
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted-base

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Require human approval for protected test changes
        working-directory: pull-request
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f ../trusted-base/tools/guard-protected-test-changes.mjs ]]; then
            node ../trusted-base/tools/guard-protected-test-changes.mjs
            exit 0
          fi

          echo "Trusted guard script is not present on the base branch yet; using inline bootstrap guard."
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { existsSync, readFileSync } from 'node:fs';

          const APPROVAL_LABEL = 'approved-test-change';

          const protectedChecks = [
            {
              reason: 'GitHub workflow',
              matches: (file) => file.startsWith('.github/workflows/'),
            },
            {
              reason: 'CODEOWNERS',
              matches: (file) => file === '.github/CODEOWNERS',
            },
            {
              reason: 'test-change guard',
              matches: (file) => file === 'tools/guard-protected-test-changes.mjs',
            },
            {
              reason: 'unit or integration test',
              matches: (file) => /\.(spec|test)\.[cm]?[jt]sx?$/.test(file),
            },
            {
              reason: 'test setup',
              matches: (file) => file.endsWith('/test-setup.ts'),
            },
            {
              reason: 'snapshot or golden output',
              matches: (file) =>
                file.includes('/__snapshots__/') ||
                file.endsWith('.snap') ||
                file.includes('/golden/'),
            },
            {
              reason: 'browser E2E project',
              matches: (file) => /^apps\/[^/]+-e2e\//.test(file),
            },
            {
              reason: 'Playwright config',
              matches: (file) => /(^|\/)playwright\.config\.[cm]?[jt]s$/.test(file),
            },
            {
              reason: 'Vitest or Vite test config',
              matches: (file) => /(^|\/)(vite|vitest)\.config\.[cm]?[jt]s$/.test(file),
            },
            {
              reason: 'test TypeScript config',
              matches: (file) => /(^|\/)tsconfig\.spec\.json$/.test(file),
            },
            {
              reason: 'public API snapshot',
              matches: (file) =>
                /(^|\/)(api-report|public-api|api-extractor)\./.test(file),
            },
          ];

          const event = readGithubEvent();
          const changedFiles = getChangedFiles(event);
          const protectedFiles = changedFiles
            .map((file) => ({
              file,
              reason: protectedChecks.find((check) => check.matches(file))?.reason,
            }))
            .filter((entry) => entry.reason);

          if (protectedFiles.length === 0) {
            console.log('No protected test, CI, or guard files changed.');
            process.exit(0);
          }

          if (hasApproval(event)) {
            console.log(
              `Protected test changes allowed by "${APPROVAL_LABEL}" approval.`,
            );
            logProtectedFiles(protectedFiles);
            process.exit(0);
          }

          console.error(
            `Protected test, CI, or guard files changed without the "${APPROVAL_LABEL}" label.`,
          );
          console.error(
            'A human reviewer should inspect the intent before this PR can update tests or their enforcement.',
          );
          logProtectedFiles(protectedFiles);
          process.exit(1);

          function readGithubEvent() {
            const eventPath = process.env.GITHUB_EVENT_PATH;

            if (!eventPath || !existsSync(eventPath)) {
              return null;
            }

            return JSON.parse(readFileSync(eventPath, 'utf8'));
          }

          function hasApproval(event) {
            if (process.env.ALLOW_PROTECTED_TEST_CHANGES === 'true') {
              return true;
            }

            return Boolean(
              event?.pull_request?.labels?.some(
                (label) => label.name === APPROVAL_LABEL,
              ),
            );
          }

          function getChangedFiles(event) {
            const pullRequestBase = event?.pull_request?.base?.sha;
            const pullRequestHead = event?.pull_request?.head?.sha;
            const baseRef =
              process.env.GITHUB_BASE_REF ||
              event?.pull_request?.base?.ref ||
              'main';
            const candidates = [];

            if (pullRequestBase && pullRequestHead) {
              candidates.push([`${pullRequestBase}...${pullRequestHead}`]);
            }

            candidates.push([`origin/${baseRef}...HEAD`], [`${baseRef}...HEAD`]);

            for (const candidate of candidates) {
              const files = tryGitDiff(candidate);

              if (files) {
                return Array.from(new Set([...files, ...getWorktreeChangedFiles()]));
              }
            }

            throw new Error(
              `Unable to resolve changed files. Tried ranges: ${candidates
                .map((candidate) => candidate.join(' '))
                .join(', ')}`,
            );
          }

          function tryGitDiff(rangeArgs) {
            try {
              const output = execFileSync(
                'git',
                ['diff', '--name-only', '--diff-filter=ACMRTUXB', ...rangeArgs],
                {
                  encoding: 'utf8',
                  stdio: ['ignore', 'pipe', 'ignore'],
                },
              );

              return output
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean);
            } catch {
              return null;
            }
          }

          function getWorktreeChangedFiles() {
            const tracked = tryGitDiff(['HEAD']) ?? [];
            const untracked = execFileSync(
              'git',
              ['ls-files', '--others', '--exclude-standard'],
              {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'ignore'],
              },
            )
              .split('\n')
              .map((line) => line.trim())
              .filter(Boolean);

            return [...tracked, ...untracked];
          }

          function logProtectedFiles(files) {
            for (const entry of files) {
              console.error(`- ${entry.file} (${entry.reason})`);
            }
          }
          NODE

  validation:
    name: Lint, typecheck, unit, and browser tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm nx run-many -t lint

      - name: Typecheck
        run: |
          pnpm exec tsc -p libs/editor/tsconfig.lib.json --noEmit
          pnpm exec tsc -p libs/editor/tsconfig.spec.json --noEmit
          pnpm exec tsc -p apps/sandbox/tsconfig.json --noEmit
          pnpm exec tsc -p apps/sandbox/tsconfig.spec.json --noEmit
          pnpm exec tsc -p apps/sandbox-e2e/tsconfig.json --noEmit

      - name: Vitest
        run: |
          pnpm nx test editor -- --run
          pnpm nx test sandbox -- --run

      - name: Build sandbox
        run: pnpm nx build sandbox

      - name: Playwright sandbox
        run: pnpm nx e2e sandbox-e2e -- --project=chromium

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-artifacts
          path: |
            dist/.playwright/apps/sandbox-e2e/playwright-report
            dist/.playwright/apps/sandbox-e2e/test-output
          if-no-files-found: ignore
