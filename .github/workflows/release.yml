name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Use npm with trusted publishing support
        run: npm install --global npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate
        run: |
          pnpm nx run-many -t lint
          pnpm exec tsc -p libs/editor/tsconfig.lib.json --noEmit
          pnpm exec tsc -p libs/editor/tsconfig.spec.json --noEmit
          pnpm exec tsc -p libs/skills/tsconfig.lib.json --noEmit
          pnpm exec tsc -p apps/sandbox/tsconfig.json --noEmit
          pnpm exec tsc -p apps/sandbox/tsconfig.spec.json --noEmit
          pnpm exec tsc -p apps/sandbox-e2e/tsconfig.json --noEmit
          pnpm nx test editor -- --run
          pnpm nx test sandbox -- --run
          pnpm nx test skills -- --run
          pnpm nx build sandbox
          pnpm nx e2e sandbox-e2e -- --project=chromium

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          if [[ "$VERSION" == "$GITHUB_REF_NAME" || -z "$VERSION" ]]; then
            echo "Expected a tag named v<semver>, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          if npm view @qalma/editor version >/dev/null 2>&1; then
            echo "first_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "first_release=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Version package from tag
        shell: bash
        run: |
          FIRST_RELEASE_FLAG=""

          if [[ "${{ steps.release.outputs.first_release }}" == "true" ]]; then
            FIRST_RELEASE_FLAG="--first-release"
          fi

          pnpm nx release version "${{ steps.release.outputs.version }}" \
            $FIRST_RELEASE_FLAG \
            --git-commit=false \
            --git-tag=false \
            --stage-changes=false

      - name: Verify package versions are unpublished
        shell: bash
        run: |
          for PACKAGE_ROOT in dist/libs/editor dist/libs/skills dist/libs/ui-kit; do
            PACKAGE_NAME="$(node -p "require('./${PACKAGE_ROOT}/package.json').name")"
            PACKAGE_VERSION="$(node -p "require('./${PACKAGE_ROOT}/package.json').version")"

            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on npm." >&2
              exit 1
            fi
          done

      - name: Publish packages with trusted publishing
        shell: bash
        run: |
          for PACKAGE_ROOT in dist/libs/ui-kit dist/libs/skills dist/libs/editor; do
            npm publish "$PACKAGE_ROOT" --access public --tag latest --provenance
          done

      - name: Create GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"

          # Extract this version's section from the committed changelog.
          awk -v v="$VERSION" '
            /^## / {
              if (capture) exit
              header = $0; sub(/^## /, "", header); split(header, parts, " ")
              if (parts[1] == v) { capture = 1; next }
            }
            capture { print }
          ' libs/editor/CHANGELOG.md > release-notes.md

          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG
