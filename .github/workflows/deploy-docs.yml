name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'libs/editor/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# OIDC: request a short-lived token to assume the AWS deploy role (no stored keys).
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-docs
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.DOCS_S3_BUCKET }}
  DISTRIBUTION_ID: ${{ vars.DOCS_CF_DISTRIBUTION_ID }}
  DEPLOY_ROLE_ARN: ${{ vars.DOCS_DEPLOY_ROLE_ARN }}
  DIST_DIR: dist/apps/docs/analog/public

jobs:
  deploy:
    name: Build & publish docs to CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs (SSG)
        run: pnpm nx build docs

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Pass 1 — hashed, content-addressed assets. Safe to cache forever.
      # --delete removes assets no longer present in the new build.
      - name: Upload immutable assets
        run: |
          aws s3 sync "$DIST_DIR" "s3://$S3_BUCKET" \
            --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --cache-control "public, max-age=31536000, immutable"

      # Pass 2 — HTML + sitemap. Always revalidate so content updates show up
      # immediately after a deploy (no stale edge HTML).
      - name: Upload HTML + sitemap (revalidate)
        run: |
          aws s3 sync "$DIST_DIR" "s3://$S3_BUCKET" \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --cache-control "public, max-age=0, must-revalidate"

      # "/*" counts as a single invalidation path (free up to 1000/month) and
      # guarantees fresh HTML at every edge. Hashed assets are immutable, so
      # re-caching them on next request is harmless.
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
