name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: request a short-lived token to assume the AWS deploy role (no stored keys).
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) Work out which *deployable* apps the push actually affects, using the Nx
  #    project graph (not crude path globs). Apps opt in via the
  #    `deploy:cloudfront` tag in their project.json.
  affected:
    name: Resolve affected deployable apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.resolve.outputs.apps }}
      any: ${{ steps.resolve.outputs.any }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Computes NX_BASE / NX_HEAD (last successful deploy → current SHA).
      - uses: nrwl/nx-set-shas@v4

      - id: resolve
        shell: bash
        run: |
          APPS=$(pnpm exec nx show projects --affected --type app -p tag:deploy:cloudfront --json | tail -n1)
          [ -z "$APPS" ] && APPS="[]"
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          if [ "$APPS" = "[]" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Affected deployable apps: $APPS"

  # 2) One matrix leg per affected deployable app. Today that's `docs`; adding a
  #    new app = tag it `deploy:cloudfront` + add a case branch below + its vars.
  deploy:
    name: Deploy ${{ matrix.app }}
    needs: affected
    if: needs.affected.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.affected.outputs.apps) }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm nx build ${{ matrix.app }}
        # PostHog (docs) reads VITE_* at build time. Public project key → repo variables, not secrets.
        env:
          VITE_POSTHOG_KEY: ${{ vars.POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}

      - name: Build docs search index
        if: matrix.app == 'docs'
        run: pnpm nx search-index docs

      - name: Resolve deploy target
        id: cfg
        shell: bash
        run: |
          case "${{ matrix.app }}" in
            docs)
              echo "dist=dist/apps/docs/analog/public" >> "$GITHUB_OUTPUT"
              echo "bucket=${{ vars.DOCS_S3_BUCKET }}" >> "$GITHUB_OUTPUT"
              echo "distribution=${{ vars.DOCS_CF_DISTRIBUTION_ID }}" >> "$GITHUB_OUTPUT"
              echo "role=${{ vars.DOCS_DEPLOY_ROLE_ARN }}" >> "$GITHUB_OUTPUT"
              # IndexNow: public domain + key (key file lives at apps/docs/public/<key>.txt).
              echo "host=qalma.dev" >> "$GITHUB_OUTPUT"
              echo "indexnow_key=57ae097f37a81fa242039798bfdb3226" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::No deploy config for '${{ matrix.app }}'"; exit 1 ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cfg.outputs.role }}
          aws-region: ${{ vars.AWS_REGION }}

      # Pass 1 — hashed, content-addressed assets: cache forever, prune removed.
      # Pagefind contains stable bootstrap filenames and is uploaded separately.
      - name: Upload immutable assets
        run: |
          aws s3 sync "${{ steps.cfg.outputs.dist }}" "s3://${{ steps.cfg.outputs.bucket }}" \
            --delete --exclude "*.html" --exclude "*.xml" --exclude "*.txt" --exclude "pagefind/*" \
            --cache-control "public, max-age=31536000, immutable"

      # Pass 2 — HTML, sitemap, robots.txt + IndexNow key: always revalidate so
      # deploys show up instantly.
      - name: Upload HTML, sitemap, txt (revalidate)
        run: |
          aws s3 sync "${{ steps.cfg.outputs.dist }}" "s3://${{ steps.cfg.outputs.bucket }}" \
            --exclude "*" --include "*.html" --include "*.xml" --include "*.txt" \
            --cache-control "public, max-age=0, must-revalidate"

      # Pass 3 — Pagefind bootstrap, WASM, and index chunks share one coherent
      # deployment and revalidate together to avoid stale browser-side runtimes.
      - name: Upload Pagefind search index (revalidate)
        if: matrix.app == 'docs'
        run: |
          aws s3 sync "${{ steps.cfg.outputs.dist }}/pagefind" "s3://${{ steps.cfg.outputs.bucket }}/pagefind" \
            --delete --cache-control "public, max-age=0, must-revalidate"

      # "/*" = one invalidation path (free up to 1000/month), fresh HTML at every edge.
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cfg.outputs.distribution }}" --paths "/*"

      # Tell IndexNow (Bing, Yandex, Seznam…; Google is trialing it) about the current
      # pages so they get crawled in minutes, not days. URLs come from the freshly built
      # sitemap. Non-blocking — a failed ping never fails the deploy. Skipped for apps
      # that don't set an IndexNow `host` in the case above.
      - name: Ping IndexNow
        if: steps.cfg.outputs.host != ''
        shell: bash
        run: |
          host="${{ steps.cfg.outputs.host }}"
          key="${{ steps.cfg.outputs.indexnow_key }}"
          sitemap="${{ steps.cfg.outputs.dist }}/sitemap.xml"
          url_json=$(grep -oE '<loc>[^<]+</loc>' "$sitemap" | sed -E 's#</?loc>##g' | jq -R . | jq -s 'map(select(length > 0))')
          count=$(echo "$url_json" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "IndexNow: no URLs found in $sitemap, skipping."
            exit 0
          fi
          payload=$(jq -n \
            --arg host "$host" \
            --arg key "$key" \
            --arg keyLocation "https://$host/$key.txt" \
            --argjson urlList "$url_json" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d "$payload")
          echo "IndexNow → HTTP $code for $count URL(s)"
          case "$code" in
            200|202) ;;
            *) echo "::warning::IndexNow ping returned $code (non-blocking)" ;;
          esac
